name: Release

# Trigger by pushing a version tag, e.g.  git tag v0.4.0 && git push origin v0.4.0
on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      # Builds the app, signs the updater artifacts, creates a DRAFT GitHub release
      # with the installers + the matching latest.json (the updater endpoint).
      # Publish the draft once all platforms have uploaded — only then does the
      # `releases/latest/download/latest.json` endpoint resolve for auto-update.
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The updater signing key has no password, so pass an empty string.
          # (It is not a secret, and GitHub won't store an empty-valued secret.)
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Notiq ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. See the commit history for changes."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
